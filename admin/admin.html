<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | DESILEAKS</title>
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .tab-btn { padding: .5rem 1rem; border-radius: .5rem; background: var(--secondary); cursor: pointer; border: 0; color: var(--foreground); }
    .tab-btn.active { background: var(--primary); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .6rem .5rem; border-bottom: 1px solid var(--border); text-align: left; font-size: .85rem; }
    th { color: var(--muted-foreground); font-weight: 600; }
  </style>
</head>
<body>
  <main class="page min-h-screen container mx-auto px-3 sm:px-4 py-6">
    <h1 class="text-3xl font-bold mb-4">Admin Panel</h1>
    <div id="admin-status" class="mb-4" style="color:var(--muted-foreground)">Checking access…</div>
    <div class="flex flex-wrap gap-2 mb-4" id="tabs">
      <button class="tab-btn active" data-tab="videos">📹 Videos</button>
      <button class="tab-btn" data-tab="categories">📁 Categories</button>
      <button class="tab-btn" data-tab="upload">⬆ Upload</button>
      <button class="tab-btn" data-tab="link">🔗 Upload by Link</button>
    </div>

    <section data-pane="videos" class="card-box" style="padding:1rem">
      <div id="videos-list">Loading…</div>
    </section>

    <section data-pane="categories" class="card-box hidden" style="padding:1rem">
      <div class="flex flex-col sm:flex-row gap-2 mb-4">
        <input id="new-cat" class="input" placeholder="New category name" />
        <button id="add-cat" class="btn-primary">Add</button>
      </div>
      <div id="cats-list">Loading…</div>
    </section>

    <section data-pane="upload" class="card-box hidden" style="padding:1rem">
      <form id="upload-form" class="space-y-4 max-w-2xl">
        <div><label class="text-sm">Title *</label><input class="input" name="title" required /></div>
        <div><label class="text-sm">Description</label><textarea class="input" name="description" rows="3"></textarea></div>
        <div><label class="text-sm">Category</label><input class="input" name="category" value="General" /></div>
        <div><label class="text-sm">Video file * (max 500MB)</label><input class="input" type="file" name="video" accept="video/*" required /></div>
        <div>
          <label class="text-sm">3:4 thumbnail (mobile)</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <input class="input flex-1" type="file" accept="image/*" data-thumb="34" />
            <button type="button" class="btn-outline" data-extract="34">🎞 Extract Frame</button>
          </div>
          <p id="status-34" class="text-xs mt-1" style="color:#22c55e"></p>
        </div>
        <div>
          <label class="text-sm">16:9 thumbnail (desktop & trending)</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <input class="input flex-1" type="file" accept="image/*" data-thumb="169" />
            <button type="button" class="btn-outline" data-extract="169">🎞 Extract Frame</button>
          </div>
          <p id="status-169" class="text-xs mt-1" style="color:#22c55e"></p>
        </div>
        <button class="btn-primary w-full" id="upload-btn">Upload Video</button>
      </form>
    </section>

    <section data-pane="link" class="card-box hidden" style="padding:1rem">
      <form id="link-form" class="space-y-4 max-w-2xl">
        <div><label class="text-sm">Title *</label><input class="input" name="title" required /></div>
        <div><label class="text-sm">Description</label><textarea class="input" name="description" rows="3"></textarea></div>
        <div><label class="text-sm">Category</label><input class="input" name="category" value="General" /></div>
        <div><label class="text-sm">Duration (mm:ss)</label><input class="input" name="duration" placeholder="0:00" /></div>
        <div><label class="text-sm">Video URL or embed code *</label>
          <textarea class="input" name="videoUrl" rows="3" placeholder="https://... or paste &lt;iframe&gt;" required></textarea>
          <p class="text-xs mt-1" style="color:var(--muted-foreground)">Supports Google Drive, YouTube, Vimeo, Streamtape, Doodstream, Mixdrop, Filemoon, Voe, Upstream, Vidoza, Luluvid.</p>
        </div>
        <div>
          <label class="text-sm">3:4 thumbnail (optional)</label>
          <input class="input" type="file" accept="image/*" data-link-thumb="34" />
          <p id="link-status-34" class="text-xs mt-1" style="color:#22c55e"></p>
        </div>
        <div>
          <label class="text-sm">16:9 thumbnail (optional)</label>
          <input class="input" type="file" accept="image/*" data-link-thumb="169" />
          <p id="link-status-169" class="text-xs mt-1" style="color:#22c55e"></p>
        </div>
        <button class="btn-primary w-full" id="link-btn">Save Link</button>
      </form>
    </section>
  </main>
  <script type="module">
    import { mountNavbar } from "/js/navbar.js";
    import { waitForAuth } from "/js/auth.js";
    import { supabase, settle } from "/js/supabase-client.js";
    import { toast } from "/js/toast.js";
    import { applySEO } from "/js/seo.js";
    import { openCropper, fileToDataURL, extractVideoFrame } from "/js/cropper.js";
    import { escapeHtml } from "/js/video-card.js";
    import { extractUrlFromInput } from "/js/video-url-handler.js";

    applySEO({ title: "Admin" });
    mountNavbar();

    async function resolveAdminAuth() {
      const auth = await waitForAuth();
      let user = auth.user;
      let isAdmin = auth.isAdmin;
      if (!user) {
        const { data } = await supabase.auth.getSession();
        user = data?.session?.user ?? null;
      }
      if (user && !isAdmin) {
        const role = await settle(
          supabase.from("user_roles").select("role").eq("user_id", user.id).eq("role", "admin").maybeSingle(),
          null
        );
        isAdmin = !!role;
      }
      return { user, isAdmin };
    }

    const auth = await resolveAdminAuth();
    if (!auth.user) {
      toast({ title: "Authentication required", variant: "destructive" });
      location.replace("/auth.html?next=/admin");
      throw new Error("Authentication required");
    }
    if (!auth.isAdmin) {
      toast({ title: "Access denied", description: "Your account is not an admin.", variant: "destructive" });
      location.replace("/");
      throw new Error("Admin role required");
    }
    document.getElementById("admin-status").remove();

    // Tabs
    const tabs = document.querySelectorAll(".tab-btn");
    const panes = document.querySelectorAll("[data-pane]");
    tabs.forEach(b => b.addEventListener("click", () => {
      tabs.forEach(t => t.classList.toggle("active", t === b));
      panes.forEach(p => p.classList.toggle("hidden", p.dataset.pane !== b.dataset.tab));
    }));

    // ----- Videos list -----
    async function loadVideos() {
      const list = document.getElementById("videos-list");
      list.innerHTML = `<p style="color:var(--muted-foreground)">Loading videos…</p>`;
      const data = await settle(supabase.from("videos").select("*").order("created_at", { ascending: false }).limit(20), []);
      if (!data.length) { list.innerHTML = `<p style="color:var(--muted-foreground)">No videos yet</p>`; return; }
      list.innerHTML = `<div style="overflow-x:auto"><table>
        <thead><tr><th>Thumb</th><th>Title</th><th>Category</th><th>Views</th><th>Primary</th><th>Actions</th></tr></thead>
        <tbody>${data.map(v => `
          <tr>
            <td><img src="${v.thumbnail_url || v.thumbnail_34_url || '/assets/placeholder.svg'}" style="width:60px;height:40px;object-fit:cover;border-radius:.25rem" /></td>
            <td style="max-width:300px"><div style="font-weight:600">${escapeHtml(v.title)}</div><div style="font-size:.7rem;color:var(--muted-foreground)">/${escapeHtml(v.slug || v.id)}</div></td>
            <td>${escapeHtml(v.category)}</td>
            <td>${(v.views || 0).toLocaleString()}</td>
            <td><button class="btn-ghost" data-primary="${v.id}" data-current="${v.is_primary}">${v.is_primary ? "⭐" : "☆"}</button></td>
            <td class="flex gap-1">
              <button class="btn-outline" data-edit="${v.id}">Edit</button>
              <button class="btn-outline" data-del="${v.id}" style="color:#ef4444">Delete</button>
            </td>
          </tr>`).join("")}</tbody></table></div>`;
      list.querySelectorAll("[data-primary]").forEach(b => b.addEventListener("click", async () => {
        const id = b.dataset.primary; const cur = b.dataset.current === "true";
        await supabase.from("videos").update({ is_primary: !cur }).eq("id", id);
        toast({ title: "Updated" }); loadVideos();
      }));
      list.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", async () => {
        if (!confirm("Delete this video?")) return;
        await supabase.from("videos").delete().eq("id", b.dataset.del);
        toast({ title: "Deleted" }); loadVideos();
      }));
      list.querySelectorAll("[data-edit]").forEach(b => b.addEventListener("click", () => editVideo(data.find(v => v.id === b.dataset.edit))));
    }

    function editVideo(v) {
      const m = document.createElement("div");
      m.className = "modal-backdrop";
      m.innerHTML = `<div class="modal"><h3 class="text-lg font-bold mb-3">Edit video</h3>
        <form class="space-y-3">
          <div><label class="text-sm">Title</label><input class="input" name="title" value="${escapeHtml(v.title)}" /></div>
          <div><label class="text-sm">Description</label><textarea class="input" name="description" rows="3">${escapeHtml(v.description || "")}</textarea></div>
          <div><label class="text-sm">Category</label><input class="input" name="category" value="${escapeHtml(v.category)}" /></div>
          <div><label class="text-sm">Video URL</label><input class="input" name="video_url" value="${escapeHtml(v.video_url)}" /></div>
          <div class="flex justify-end gap-2"><button type="button" class="btn-outline" id="cancel">Cancel</button><button class="btn-primary" type="submit">Save</button></div>
        </form></div>`;
      document.body.appendChild(m);
      m.querySelector("#cancel").onclick = () => m.remove();
      m.querySelector("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = Object.fromEntries(new FormData(e.target));
        const { error } = await supabase.from("videos").update(fd).eq("id", v.id);
        if (error) return toast({ title: "Error", description: error.message, variant: "destructive" });
        toast({ title: "Saved" }); m.remove(); loadVideos();
      });
    }

    // ----- Categories -----
    async function loadCats() {
      const list = document.getElementById("cats-list");
      list.innerHTML = `<p style="color:var(--muted-foreground)">Loading categories…</p>`;
      const data = await settle(supabase.from("categories").select("*").order("display_order", { ascending: true }), []);
      list.innerHTML = (data || []).map(c => `
        <div class="flex items-center gap-3 p-2 sm:p-3 border-b" style="border-color:var(--border)">
          ${c.image_url ? `<img src="${c.image_url}" style="width:40px;height:40px;border-radius:9999px;object-fit:cover" />` : `<div style="width:40px;height:40px;border-radius:9999px;background:var(--muted);display:flex;align-items:center;justify-content:center">${escapeHtml(c.name[0].toUpperCase())}</div>`}
          <div class="flex-1 text-sm font-medium">${escapeHtml(c.name)}</div>
          <input type="file" accept="image/*" class="hidden" data-cat-img="${c.id}" />
          <button class="btn-outline" data-set-img="${c.id}">Image</button>
          <button class="btn-outline" data-del-cat="${c.id}" style="color:#ef4444">Delete</button>
        </div>`).join("") || `<p style="color:var(--muted-foreground)">No categories</p>`;
      list.querySelectorAll("[data-set-img]").forEach(b => b.addEventListener("click", () => list.querySelector(`[data-cat-img="${b.dataset.setImg}"]`).click()));
      list.querySelectorAll("[data-cat-img]").forEach(inp => inp.addEventListener("change", async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const dataUrl = await fileToDataURL(file);
        let blob; try { blob = await openCropper(dataUrl, 1); } catch { return; }
        const fname = `${Date.now()}-${inp.dataset.catImg}.jpg`;
        const { error: upErr } = await supabase.storage.from("category-images").upload(fname, blob);
        if (upErr) return toast({ title: "Upload failed", description: upErr.message, variant: "destructive" });
        const { data: { publicUrl } } = supabase.storage.from("category-images").getPublicUrl(fname);
        await supabase.from("categories").update({ image_url: publicUrl }).eq("id", inp.dataset.catImg);
        toast({ title: "Updated" }); loadCats();
      }));
      list.querySelectorAll("[data-del-cat]").forEach(b => b.addEventListener("click", async () => {
        if (!confirm("Delete this category?")) return;
        await supabase.from("categories").delete().eq("id", b.dataset.delCat);
        toast({ title: "Deleted" }); loadCats();
      }));
    }
    document.getElementById("add-cat").addEventListener("click", async () => {
      const name = document.getElementById("new-cat").value.trim();
      if (!name) return toast({ title: "Enter a name", variant: "destructive" });
      const { error } = await supabase.from("categories").insert({ name });
      if (error) return toast({ title: "Error", description: error.message, variant: "destructive" });
      document.getElementById("new-cat").value = ""; toast({ title: "Added" }); loadCats();
    });

    // ----- Upload (file) -----
    const thumbBlobs = { "34": null, "169": null };
    document.querySelectorAll("[data-thumb]").forEach(inp => inp.addEventListener("change", async (e) => {
      const file = e.target.files[0]; if (!file) return;
      const aspect = inp.dataset.thumb === "34" ? 3/4 : 16/9;
      const url = await fileToDataURL(file);
      try { const blob = await openCropper(url, aspect); thumbBlobs[inp.dataset.thumb] = blob; document.getElementById(`status-${inp.dataset.thumb}`).textContent = "✓ Ready"; } catch {}
    }));
    document.querySelectorAll("[data-extract]").forEach(btn => btn.addEventListener("click", async () => {
      const videoFile = document.querySelector("[name=video]").files[0];
      if (!videoFile) return toast({ title: "Select video first", variant: "destructive" });
      const aspect = btn.dataset.extract === "34" ? 3/4 : 16/9;
      const frame = await extractVideoFrame(videoFile, 1);
      try { const blob = await openCropper(frame, aspect); thumbBlobs[btn.dataset.extract] = blob; document.getElementById(`status-${btn.dataset.extract}`).textContent = "✓ Ready"; } catch {}
    }));
    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target));
      const videoFile = e.target.querySelector("[name=video]").files[0];
      if (!videoFile) return toast({ title: "Select a video", variant: "destructive" });
      if (videoFile.size > 500 * 1024 * 1024) return toast({ title: "Video > 500MB", variant: "destructive" });
      const btn = document.getElementById("upload-btn"); btn.disabled = true; btn.textContent = "Uploading…";
      try {
        const vName = `${Date.now()}-${videoFile.name}`;
        const { error: ve } = await supabase.storage.from("videos").upload(vName, videoFile);
        if (ve) throw ve;
        const videoUrl = supabase.storage.from("videos").getPublicUrl(vName).data.publicUrl;
        const t34 = await uploadThumb(thumbBlobs["34"], "34");
        const t169 = await uploadThumb(thumbBlobs["169"], "169");
        // duration
        const tmpV = document.createElement("video"); tmpV.src = URL.createObjectURL(videoFile);
        await new Promise(r => tmpV.onloadedmetadata = r);
        const duration = `${Math.floor(tmpV.duration/60)}:${Math.floor(tmpV.duration%60).toString().padStart(2,"0")}`;
        await supabase.from("categories").upsert({ name: fd.category }, { onConflict: "name" });
        const { error: dbErr } = await supabase.from("videos").insert({ title: fd.title, description: fd.description, category: fd.category, video_url: videoUrl, thumbnail_url: t169, thumbnail_34_url: t34, duration });
        if (dbErr) throw dbErr;
        toast({ title: "Uploaded!" }); e.target.reset(); thumbBlobs["34"] = thumbBlobs["169"] = null;
        document.getElementById("status-34").textContent = ""; document.getElementById("status-169").textContent = "";
        loadVideos();
      } catch (err) { toast({ title: "Error", description: err.message || String(err), variant: "destructive" }); }
      finally { btn.disabled = false; btn.textContent = "Upload Video"; }
    });
    async function uploadThumb(blob, suffix) {
      if (!blob) return null;
      const { upscaleBlob } = await import("/js/upscaler.js");
      const upscaled = await upscaleBlob(blob, 2);
      const name = `${Date.now()}-${suffix}.jpg`;
      const { error } = await supabase.storage.from("thumbnails").upload(name, upscaled, {
        contentType: "image/jpeg",
        cacheControl: "31536000",
      });
      if (error) throw error;
      return supabase.storage.from("thumbnails").getPublicUrl(name).data.publicUrl;
    }

    // ----- Upload by link -----
    const linkBlobs = { "34": null, "169": null };
    document.querySelectorAll("[data-link-thumb]").forEach(inp => inp.addEventListener("change", async (e) => {
      const file = e.target.files[0]; if (!file) return;
      const aspect = inp.dataset.linkThumb === "34" ? 3/4 : 16/9;
      const url = await fileToDataURL(file);
      try { const blob = await openCropper(url, aspect); linkBlobs[inp.dataset.linkThumb] = blob; document.getElementById(`link-status-${inp.dataset.linkThumb}`).textContent = "✓ Ready"; } catch {}
    }));
    document.getElementById("link-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target));
      const { url: extracted } = extractUrlFromInput(fd.videoUrl);
      if (!extracted) return toast({ title: "Invalid URL", variant: "destructive" });
      const btn = document.getElementById("link-btn"); btn.disabled = true; btn.textContent = "Saving…";
      try {
        const t34 = await uploadThumb(linkBlobs["34"], "l34");
        let t169 = await uploadThumb(linkBlobs["169"], "l169");
        // Auto-thumb fallback for Google Drive
        if (!t169) {
          const dm = extracted.match(/drive\.google\.com\/file\/d\/([^/]+)/);
          if (dm) t169 = `https://drive.google.com/thumbnail?id=${dm[1]}&sz=w1280`;
        }
        await supabase.from("categories").upsert({ name: fd.category }, { onConflict: "name" });
        const { error } = await supabase.from("videos").insert({ title: fd.title, description: fd.description, category: fd.category, video_url: extracted, thumbnail_url: t169, thumbnail_34_url: t34, duration: fd.duration });
        if (error) throw error;
        toast({ title: "Saved!" }); e.target.reset(); linkBlobs["34"] = linkBlobs["169"] = null;
        document.getElementById("link-status-34").textContent = ""; document.getElementById("link-status-169").textContent = "";
        loadVideos();
      } catch (err) { toast({ title: "Error", description: err.message || String(err), variant: "destructive" }); }
      finally { btn.disabled = false; btn.textContent = "Save Link"; }
    });

    loadVideos(); loadCats();
  </script>
</body>
</html>
