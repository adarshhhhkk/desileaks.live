<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>All Videos | DESILEAKS</title>
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="page min-h-screen">
    <section class="px-3 py-6 sm:px-4 sm:py-8 md:px-6 md:py-10 lg:container lg:mx-auto">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center section-tabs">
          <a href="/" class="text-lg font-bold sm:text-xl md:text-2xl" style="color:var(--muted-foreground)">Trending Now</a>
          <span class="text-lg font-bold sm:text-xl md:text-2xl px-3 py-1 rounded" style="background:#fff;color:#000">All Videos</span>
        </div>
        <select id="sort" class="input home-sort" style="width:auto">
          <option value="latest">Latest</option><option value="oldest">Oldest</option><option value="most_viewed">Most Viewed</option>
        </select>
      </div>
      <div id="grid"></div>
    </section>
  </main>
  <script type="module">
    import { mountNavbar } from "/js/navbar.js";
    import { supabase, settle } from "/js/supabase-client.js";
    import { gridHTML, skeletonGridHTML } from "/js/video-card.js";
    import { applySEO } from "/js/seo.js";
    applySEO({ title: "All Videos" });
    mountNavbar();
    const grid = document.getElementById("grid"), sort = document.getElementById("sort");
    async function load() {
      grid.innerHTML = skeletonGridHTML(12);
      let q = supabase.from("videos").select("id,title,thumbnail_url,duration,views,created_at,slug");
      const v = sort.value;
      if (v === "latest") q = q.order("created_at", { ascending: false });
      else if (v === "oldest") q = q.order("created_at", { ascending: true });
      else q = q.order("views", { ascending: false });
      const data = await settle(q.limit(20), []);
      grid.innerHTML = data.length ? gridHTML(data) : `<div class="empty-state"><p>No videos yet</p></div>`;
    }
    sort.addEventListener("change", load); load();
  </script>
</body>
</html>
