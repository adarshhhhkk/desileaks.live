<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | DESILEAKS</title>
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="min-h-screen flex flex-col items-center justify-center px-4">
    <a href="/" class="mb-6 flex items-center gap-2">
      <img src="/assets/logo-small.webp" alt="logo" class="h-10" />
      <h1 class="text-3xl font-bold" style="color:var(--primary)">DESILEAKS</h1>
    </a>
    <div class="card-box w-full max-w-md">
      <div class="grid grid-cols-2 gap-1 mb-4">
        <button id="tab-login" class="btn-outline" style="background:var(--secondary)">Login</button>
        <button id="tab-signup" class="btn-outline">Sign Up</button>
      </div>
      <form id="form-login" class="space-y-4">
        <div><label class="text-sm">Email</label><input class="input" type="email" name="email" required /></div>
        <div><label class="text-sm">Password</label><input class="input" type="password" name="password" required /></div>
        <button class="btn-primary w-full" type="submit">Login</button>
      </form>
      <form id="form-signup" class="space-y-4 hidden">
        <div><label class="text-sm">Email</label><input class="input" type="email" name="email" required /></div>
        <div><label class="text-sm">Password</label><input class="input" type="password" name="password" required /></div>
        <div><label class="text-sm">Confirm Password</label><input class="input" type="password" name="confirm" required /></div>
        <button class="btn-primary w-full" type="submit">Sign Up</button>
      </form>
    </div>
  </main>
  <script type="module">
    import { supabase } from "/js/supabase-client.js";
    import { toast } from "/js/toast.js";
    import { applySEO } from "/js/seo.js";
    applySEO({ title: "Login" });
    const tabLogin = document.getElementById("tab-login"), tabSignup = document.getElementById("tab-signup");
    const fLogin = document.getElementById("form-login"), fSignup = document.getElementById("form-signup");
    function show(which) {
      fLogin.classList.toggle("hidden", which !== "login");
      fSignup.classList.toggle("hidden", which !== "signup");
      tabLogin.style.background = which === "login" ? "var(--secondary)" : "";
      tabSignup.style.background = which === "signup" ? "var(--secondary)" : "";
    }
    tabLogin.onclick = () => show("login"); tabSignup.onclick = () => show("signup");
    fLogin.addEventListener("submit", async (e) => {
      e.preventDefault(); const fd = new FormData(fLogin);
      const btn = fLogin.querySelector("button[type=submit]"); btn.disabled = true; btn.textContent = "Logging in…";
      const { error } = await supabase.auth.signInWithPassword({ email: fd.get("email"), password: fd.get("password") });
      btn.disabled = false; btn.textContent = "Login";
      if (error) return toast({ title: "Login failed", description: error.message, variant: "destructive" });
      toast({ title: "Welcome back!" }); location.href = new URLSearchParams(location.search).get("next") || "/";
    });
    fSignup.addEventListener("submit", async (e) => {
      e.preventDefault(); const fd = new FormData(fSignup);
      const password = fd.get("password");
      if (password !== fd.get("confirm")) return toast({ title: "Passwords do not match", variant: "destructive" });
      const ok = /^(?=.{10,})(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[^A-Za-z0-9]).+$/.test(password);
      if (!ok) return toast({ title: "Weak password", description: "Min 10 chars, upper, lower, digit, symbol", variant: "destructive" });
      const { error } = await supabase.auth.signUp({ email: fd.get("email"), password, options: { emailRedirectTo: `${location.origin}/` } });
      if (error) return toast({ title: "Signup failed", description: error.message, variant: "destructive" });
      toast({ title: "Account created!" }); location.href = "/";
    });
  </script>
</body>
</html>
